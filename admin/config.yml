backend:
  name: github
  repo: Opsimtech/Opsimtech.github.io
  branch: main
  base_url: https://decap-oauth.opsimtech-ai.workers.dev
  site_domain: opsimtech.com

media_folder: uploads
public_folder: /uploads

collections:
  - name: pages
    label: Pages
    files:
      - label: Home
        name: home
        file: index.html
        fields:
          - { label: Body, name: body, widget: markdown }
