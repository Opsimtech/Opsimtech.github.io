<svg width="480" height="120" viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>OpSimTech — Dark Logo</title>
  <desc>OpSimTech waveform twin logo on dark background</desc>

  <rect width="480" height="120" fill="#050608"/>

  <defs>
    <linearGradient id="grad-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1AE0B5"/>
      <stop offset="100%" stop-color="#0BBF95"/>
    </linearGradient>
  </defs>

  <!-- Waveform mark -->
  <!-- Physics wave — solid, primary teal -->
  <path d="M24 60 C40 28 56 28 72 60 C88 92 104 92 120 60 C136 28 152 28 168 60"
        stroke="#1AE0B5" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Twin wave — dashed, dim teal -->
  <path d="M32 60 C48 32 64 32 80 60 C96 88 112 88 128 60 C144 32 160 32 176 60"
        stroke="#0BBF95" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="7 5.5" opacity="0.70" fill="none"/>
  <!-- Zero-crossing anchor dots — solid rings for maximum visibility -->
  <circle cx="24"  cy="60" r="5.5" fill="#050608" stroke="#1AE0B5" stroke-width="2"/>
  <circle cx="24"  cy="60" r="2.5" fill="#1AE0B5"/>
  <circle cx="72"  cy="60" r="5.5" fill="#050608" stroke="#1AE0B5" stroke-width="2"/>
  <circle cx="72"  cy="60" r="2.5" fill="#1AE0B5"/>
  <circle cx="120" cy="60" r="5.5" fill="#050608" stroke="#0BBF95" stroke-width="2"/>
  <circle cx="120" cy="60" r="2.5" fill="#0BBF95"/>
  <!-- Crest accent dots — increased opacity -->
  <circle cx="48"  cy="28" r="3.5" fill="#1AE0B5" opacity="0.90"/>
  <circle cx="96"  cy="92" r="3.5" fill="#0BBF95" opacity="0.85"/>
  <circle cx="144" cy="28" r="3"   fill="#1AE0B5" opacity="0.70"/>

  <!-- Wordmark -->
  <text x="196" y="70"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="52"
        font-weight="500"
        letter-spacing="-1.2"
        fill="#FFFFFF">OpSim</text>
  <text x="356" y="70"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="52"
        font-weight="500"
        letter-spacing="-1.2"
        fill="url(#grad-dark)">Tech</text>

  <!-- Tagline -->
  <text x="197" y="92"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="3"
        fill="#A8B0BC">PHYSICS-AI · DIGITAL TWINS</text>
</svg>
