<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opsimtech — Logo Exploration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #ECE8E1;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        color: #0E1116;
        -webkit-font-smoothing: antialiased;
      }
      .mono {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 10px;
        color: #6E6657;
      }
      .wordmark {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        letter-spacing: -0.025em;
        color: inherit;
      }
      .tagline {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.05em;
        color: #6E6657;
      }
      .artboard-shell {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: #F6F4EF;
        border-radius: 2px;
        overflow: hidden;
      }
      .ab-meta {
        display: flex;
        justify-content: space-between;
        padding: 22px 28px 0;
      }
      .ab-bigmark {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 0;
      }
      .ab-lockup-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px;
        border-top: 1px solid #E4DFD3;
      }
      .ab-lockup {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .ab-stack {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }
      .ab-dark {
        background: #0E1116;
        color: #F6F4EF;
        padding: 20px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .ab-dark .mono {
        color: #6B6E78;
      }
      .scale-row {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .dot-sep {
        width: 4px;
        height: 4px;
        background: #6B6E78;
        border-radius: 50%;
      }
      .canvas-header {
        position: fixed;
        top: 18px;
        left: 22px;
        z-index: 2;
        pointer-events: none;
      }
      .canvas-header h1 {
        font-size: 14px;
        margin: 0;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .canvas-header p {
        margin: 4px 0 0;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6E6657;
      }
    </style>
  </head>
  <body>
    <div class="canvas-header">
      <h1>Opsimtech / logo exploration</h1>
      <p>5 marks · physics meets intelligence for industry</p>
    </div>

    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="marks.jsx"></script>

    <script type="text/babel">
      const CONCEPTS = [
        {
          id: 'phase',
          name: 'Phase',
          code: '01 · WAVEFORM',
          description: 'Oscillation / signal',
          tagline: 'Physics, simulated.',
          Mark: window.PhaseMark,
          useAccent: true,
        },
        {
          id: 'mesh',
          name: 'Mesh',
          code: '02 · FEM RING',
          description: 'Triangulated solver',
          tagline: 'Every operation, modeled.',
          Mark: window.MeshMark,
          useAccent: false,
        },
        {
          id: 'streamline',
          name: 'Streamline',
          code: '03 · VECTOR FIELD',
          description: 'CFD vorticity',
          tagline: 'Flow you can compute.',
          Mark: window.StreamlineMark,
          useAccent: false,
        },
        {
          id: 'gauge',
          name: 'Gauge',
          code: '04 · INSTRUMENT',
          description: 'Industrial precision',
          tagline: 'Measure. Model. Move.',
          Mark: window.GaugeMark,
          useAccent: true,
        },
        {
          id: 'lattice',
          name: 'Lattice',
          code: '05 · DOT MATRIX',
          description: 'Computed structure',
          tagline: 'Intelligence, made physical.',
          Mark: window.LatticeMark,
          useAccent: false,
        },
      ];

      function ConceptCard({ concept }) {
        const { Mark, name, code, description, tagline, useAccent } = concept;
        const accent = useAccent ? window.MARK_ACCENT : window.MARK_INK;
        return (
          <div className="artboard-shell">
            <div className="ab-meta">
              <span className="mono">{code}</span>
              <span className="mono">{description}</span>
            </div>

            <div className="ab-bigmark">
              <Mark size={260} color={window.MARK_INK} accent={accent} />
            </div>

            <div className="ab-lockup-row">
              <div className="ab-lockup">
                <Mark size={42} color={window.MARK_INK} accent={accent} />
                <span className="wordmark" style={{ fontSize: 30 }}>
                  opsimtech
                </span>
              </div>
              <div className="ab-stack">
                <span className="wordmark" style={{ fontSize: 20 }}>
                  opsimtech
                </span>
                <span className="tagline">{tagline}</span>
              </div>
            </div>

            <div className="ab-dark">
              <div className="ab-lockup">
                <Mark size={34} color={window.MARK_PAPER} accent={useAccent ? 'oklch(0.78 0.15 248)' : window.MARK_PAPER} />
                <span className="wordmark" style={{ fontSize: 24 }}>
                  opsimtech
                </span>
              </div>
              <div className="scale-row">
                <span className="mono" style={{ color: '#6B6E78' }}>scale</span>
                <Mark size={22} color={window.MARK_PAPER} accent={window.MARK_PAPER} />
                <Mark size={14} color={window.MARK_PAPER} accent={window.MARK_PAPER} />
                <Mark size={10} color={window.MARK_PAPER} accent={window.MARK_PAPER} />
              </div>
            </div>
          </div>
        );
      }

      function App() {
        return (
          <window.DesignCanvas>
            <window.DCSection id="marks" title="Logo Concepts">
              {CONCEPTS.map((c) => (
                <window.DCArtboard key={c.id} id={c.id} label={c.name} width={520} height={640}>
                  <ConceptCard concept={c} />
                </window.DCArtboard>
              ))}
            </window.DCSection>
          </window.DesignCanvas>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
